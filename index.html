<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main">
        <h1>My Dictionary</h1>
        <p class="subtitle">Search meanings, pronunciation, and examples.</p>

        <form id="dictionary-form">
            <input
                type="text"
                id="wordInput"
                placeholder="Enter a word..."
                autocomplete="off"
                required
            >

            <button type="submit" id="searchBtn">
                Search
            </button>
        </form>

        <section class="result-container">
            <div id="output">
                Search for a word to see its meaning.
            </div>

            <p id="message"></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
